<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обработка измерений - Сервис коллаборативного позиционирования</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eeb344 0%, #9be041 100%);
            min-height: 100vh;
            color: #333;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #eeb344, #9be041);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }
        .logo-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }
        .main-content {
            max-width: 800px;
            margin: 120px auto 50px;
            padding: 0 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        .card h2 {
            text-align: center;
            margin-bottom: 32px;
            color: #2c3e2f;
            font-size: 1.8rem;
        }
        .method-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .method-option {
            background: #f5f5f5;
            border: 2px solid #e0e5e0;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .method-option:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        .method-option.selected {
            border-color: #9be041;
            background: linear-gradient(135deg, rgba(155,224,65,0.1), rgba(238,179,68,0.1));
        }
        .method-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .method-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e2f;
        }
        .method-desc {
            font-size: 0.85rem;
            color: #666;
            line-height: 1.4;
        }
        .method-detail {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .method-detail h4 {
            margin-bottom: 12px;
            color: #eeb344;
        }
        .method-detail ul {
            margin-left: 20px;
            color: #666;
        }
        .method-detail li {
            margin: 8px 0;
        }
        .file-zone {
            border: 2px dashed #e0e5e0;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-zone:hover {
            border-color: #9be041;
            background: rgba(155, 224, 65, 0.05);
        }
        .file-zone.drag-over {
            border-color: #9be041;
            background: rgba(155, 224, 65, 0.1);
        }
        .file-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .file-info {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #666;
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #eeb344, #9be041);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(155, 224, 65, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .status-success { background: #e6f7e6; color: #2e7d32; }
        .status-error { background: #fee2e2; color: #c53030; }
        @media (max-width: 768px) {
            .method-selector { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo" onclick="window.location.href='/'">
                <div class="logo-icon">📡</div>
                <div class="logo-text">Collab<span>Service</span></div>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="card">
            <h2>📡 Обработка спутниковых измерений</h2>
            <div class="method-selector">
                <div class="method-option" data-method="single" onclick="selectMethod('single')">
                    <div class="method-icon">📍</div>
                    <div class="method-title">Абсолютный метод</div>
                    <div class="method-desc">Single Point Positioning</div>
                </div>
                <div class="method-option" data-method="relative" onclick="selectMethod('relative')">
                    <div class="method-icon">📡📡</div>
                    <div class="method-title">Относительный метод</div>
                    <div class="method-desc">Differential / RTK</div>
                </div>
                <div class="method-option" data-method="ppp" onclick="selectMethod('ppp')">
                    <div class="method-icon">🎯</div>
                    <div class="method-title">PPP метод</div>
                    <div class="method-desc">Precise Point Positioning</div>
                </div>
            </div>
            <div id="methodDetail" class="method-detail"></div>
            <div class="file-zone" id="fileZone" onclick="document.getElementById('fileInput').click()">
                <div class="file-icon">📁</div>
                <div>Нажмите или перетащите файл наблюдений</div>
                <div class="file-info" id="fileInfo">Поддерживаются форматы: RINEX, RTCM3, UBX, BIN</div>
                <input type="file" id="fileInput" style="display: none" accept=".obs,.rnx,.rtcm3,.ubx,.bin,.crx,.gz">
            </div>
            <button id="processBtn" class="btn-primary" onclick="startProcessing()" disabled>Выберите метод и файл</button>
            <div id="status" class="status-message"></div>
        </div>
    </main>

    <script>
        let selectedMethod = null;
        let selectedFile = null;

        const methodDetails = {
            single: {
                title: "📌 Абсолютный метод (SPP)",
                description: "Одиночное точечное позиционирование с использованием только псевдодальностей",
                features: ["✅ Не требует базовой станции", "✅ Точность: 3-10 метров", "✅ Использует широковещательные эфемериды", "✅ Быстрая обработка"],
                config: { method: "single", mode: "kinematic", frequency: "l1+l2", elevationMask: 10, ionoModel: "brdc", tropModel: "saas", arMode: "off", dynamics: false, tideCorr: false, usePreciseEphemeris: false, usePreciseClock: false, useDcb: false, useErp: false, satelliteSystem: 1 }
            },
            relative: {
                title: "🔗 Относительный метод (Differential)",
                description: "Дифференциальное позиционирование с использованием базовой станции",
                features: ["✅ Требуется базовая станция (автоматический выбор)", "✅ Точность: 0.1-1 метр", "✅ Разрешение неоднозначностей", "✅ Лучшая точность в кинематике"],
                config: { method: "relative", mode: "kinematic", frequency: "l1+l2", elevationMask: 10, ionoModel: "dual-freq", tropModel: "saas", arMode: "continuous", dynamics: true, tideCorr: false, usePreciseEphemeris: false, usePreciseClock: false, useDcb: false, useErp: false, satelliteSystem: 1, baseStation: "auto" }
            },
            ppp: {
                title: "🎯 PPP метод",
                description: "Прецизионное точечное позиционирование",
                features: ["✅ Сантиметровая точность", "✅ Не требует базовой станции", "✅ Использует точные эфемериды и часы", "✅ Требует больше времени на обработку"],
                config: { method: "ppp", mode: "kinematic", frequency: "l1+l2+l5", elevationMask: 10, ionoModel: "dual-freq", tropModel: "est-ztd", arMode: "continuous", dynamics: true, tideCorr: true, usePreciseEphemeris: true, usePreciseClock: true, useDcb: true, useErp: true, satelliteSystem: 13 }
            }
        };

        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.method-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelector(`[data-method="${method}"]`).classList.add('selected');
            const detail = methodDetails[method];
            document.getElementById('methodDetail').innerHTML = `<h4>${detail.title}</h4><p>${detail.description}</p><ul>${detail.features.map(f => `<li>${f}</li>`).join('')}</ul>`;
            updateButtonState();
        }

        function updateButtonState() {
            const btn = document.getElementById('processBtn');
            if (selectedMethod && selectedFile) {
                btn.disabled = false;
                btn.textContent = '🚀 Запустить обработку';
            } else if (selectedMethod && !selectedFile) {
                btn.disabled = true;
                btn.textContent = '📁 Выберите файл наблюдений';
            } else if (!selectedMethod && selectedFile) {
                btn.disabled = true;
                btn.textContent = '📍 Выберите метод обработки';
            } else {
                btn.disabled = true;
                btn.textContent = 'Выберите метод и файл';
            }
        }

        const fileZone = document.getElementById('fileZone');
        fileZone.addEventListener('dragover', (e) => { e.preventDefault(); fileZone.classList.add('drag-over'); });
        fileZone.addEventListener('dragleave', () => { fileZone.classList.remove('drag-over'); });
        fileZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        document.getElementById('fileInput').addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });
        
        function handleFile(file) {
            selectedFile = file;
            const fileInfo = document.getElementById('fileInfo');
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            fileInfo.innerHTML = `✅ ${file.name} (${sizeMB} MB)`;
            fileInfo.style.color = '#2e7d32';
            updateButtonState();
        }
        
        async function startProcessing() {
            if (!selectedMethod || !selectedFile) return;
            const btn = document.getElementById('processBtn');
            const statusDiv = document.getElementById('status');
            btn.disabled = true;
            btn.textContent = '⏳ Обработка...';
            const config = methodDetails[selectedMethod].config;
            const formData = new FormData();
            formData.append('config', JSON.stringify(config));
            formData.append('file', selectedFile);
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/measurements/process', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    statusDiv.className = 'status-message status-success';
                    statusDiv.style.display = 'block';
                    statusDiv.innerHTML = `✅ Обработка запущена! ID задачи: ${data.taskId}<br>Результат появится в истории личного кабинета.`;
                    setTimeout(() => { window.location.href = '/profile'; }, 3000);
                } else {
                    statusDiv.className = 'status-message status-error';
                    statusDiv.style.display = 'block';
                    statusDiv.textContent = data.error || '❌ Ошибка запуска обработки';
                    btn.disabled = false;
                    btn.textContent = '🚀 Запустить обработку';
                }
            } catch (error) {
                statusDiv.className = 'status-message status-error';
                statusDiv.style.display = 'block';
                statusDiv.textContent = '❌ Ошибка соединения с сервером';
                btn.disabled = false;
                btn.textContent = '🚀 Запустить обработку';
            }
        }
    </script>
</body>
</html>
