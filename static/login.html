<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Вход — Collaborative Positioning</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
    --sky: #6aabcf; --sky-lt: #93c4e0; --sky-dk: #4a8fb5;
    --sky-glow: rgba(106,171,207,0.18);
    --bg: #f0f4f8; --bg-alt: #e6ecf3;
    --surface: rgba(255,255,255,0.92); --surface-2: rgba(255,255,255,0.70);
    --border: rgba(0,0,0,0.08); --border-hv: rgba(106,171,207,0.55);
    --ink: #1e2a38; --ink-2: #4a5568; --muted: #718096; --ghost: #e2e8f0;
    --ok: #2f855a; --ok-bg: #c6f6d5;
    --err: #c53030; --err-bg: #fed7d7;
    --warn: #b7791f; --warn-bg: #fefcbf;
    --info-bg: #ebf8ff; --info: #2b6cb0;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 14px rgba(80,110,140,0.10);
    --shadow-lg: 0 8px 32px rgba(80,110,140,0.14);
    --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 24px;
    --t: .2s ease; --header-h: 64px;
}
[data-theme="dark"] {
    --sky: #7bbfe0; --sky-lt: #a8d4ee; --sky-dk: #5aaacf;
    --sky-glow: rgba(123,191,224,0.14);
    --bg: #0f1923; --bg-alt: #152030;
    --surface: rgba(20,32,48,0.97); --surface-2: rgba(20,32,48,0.70);
    --border: rgba(255,255,255,0.08); --border-hv: rgba(123,191,224,0.45);
    --ink: #e8f0f8; --ink-2: #a0b8cc; --muted: #627d8e; --ghost: #1e3040;
    --ok: #68d391; --ok-bg: rgba(56,161,105,0.18);
    --err: #fc8181; --err-bg: rgba(197,48,48,0.18);
    --warn: #f6ad55; --warn-bg: rgba(183,121,31,0.18);
    --info-bg: rgba(43,108,176,0.18); --info: #90cdf4;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
    --shadow-lg: 0 8px 36px rgba(0,0,0,0.45);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Onest', 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    transition: background .3s, color .3s;
}
h1,h2,h3,h4,h5 { font-family: 'Onest', sans-serif; font-weight: 600; color: var(--ink); }
p { color: var(--ink-2); }
a { color: var(--sky-dk); }
.mono, code { font-family: 'JetBrains Mono', monospace; }

/* Header */
.header {
    background: var(--surface); backdrop-filter: blur(16px);
    padding: 0 2rem; box-shadow: var(--shadow-sm);
    border-bottom: 1px solid var(--border);
    position: fixed; width: 100%; top: 0; z-index: 1000;
    height: var(--header-h); display: flex; align-items: center;
    transition: background .3s, border-color .3s;
}
.header-content {
    max-width: 1200px; margin: 0 auto; width: 100%;
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
}
.logo, .logo-row, .auth-logo-row {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; cursor: pointer; flex-shrink: 0;
}
.logo-icon, .logo-gem {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--sky), var(--sky-dk));
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 18px;
    box-shadow: 0 2px 8px var(--sky-glow);
    transition: transform .2s;
}
.logo:hover .logo-icon, .logo:hover .logo-gem,
.auth-logo-row:hover .logo-icon, .auth-logo-row:hover .logo-gem { transform: scale(1.06); }
.logo-text, .logo-name {
    font-size: 1.1rem; font-weight: 600; color: var(--ink);
    letter-spacing: -0.3px;
}
.logo-text span, .logo-name span { color: var(--sky-dk); }

/* Theme toggle button */
.theme-toggle {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all .2s; color: var(--ink-2); flex-shrink: 0;
    line-height: 1;
}
.theme-toggle:hover { background: var(--sky-glow); border-color: var(--sky); transform: rotate(20deg); }

/* User area */
.user-info, .user-menu { display: flex; align-items: center; gap: 12px; }
.user-name { color: var(--muted); font-weight: 500; font-size: 0.9rem; white-space: nowrap; }
.user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: hidden; flex-shrink: 0;
    border: 2px solid var(--border-hv); transition: transform .2s, box-shadow .2s;
}
.user-avatar:hover { transform: scale(1.08); box-shadow: 0 3px 12px var(--sky-glow); }
.user-avatar.av-letter {
    background: linear-gradient(135deg, var(--sky), var(--sky-dk));
    color: #fff; font-weight: 700; font-size: 14px;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.logout-btn, .btn-logout {
    background: none; border: none; color: var(--err); cursor: pointer;
    padding: 6px 10px; font-size: 0.82rem; font-family: 'Onest', inherit;
    border-radius: var(--r-sm); transition: background .2s; white-space: nowrap;
}
.logout-btn:hover, .btn-logout:hover { background: var(--err-bg); }
.auth-buttons { display: flex; gap: 10px; }
.login-link {
    color: var(--muted); text-decoration: none; font-size: 0.9rem;
    padding: 7px 16px; border-radius: 20px; transition: background .2s, color .2s;
    font-family: 'Onest', sans-serif;
}
.login-link:hover { background: var(--ghost); color: var(--ink); }
.register-link {
    background: linear-gradient(135deg, var(--sky), var(--sky-dk));
    padding: 7px 18px; border-radius: 20px; color: #fff;
    text-decoration: none; font-size: 0.9rem; font-weight: 500;
    font-family: 'Onest', sans-serif;
    box-shadow: 0 2px 10px var(--sky-glow); transition: transform .2s, box-shadow .2s;
}
.register-link:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--sky-glow); }

/* Main layout */
.main-content, .main {
    max-width: 1200px; margin: 0 auto;
    padding: calc(var(--header-h) + 32px) 20px 60px;
}
.main { max-width: 1000px; }

/* Card */
.card {
    background: var(--surface); backdrop-filter: blur(12px);
    border-radius: var(--r-lg); padding: 32px;
    box-shadow: var(--shadow-md); border: 1px solid var(--border);
    transition: background .3s, border-color .3s;
}
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
.card-title { font-size: 1rem; font-weight: 600; color: var(--ink); }

/* Buttons */
.btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 9px 18px; border-radius: var(--r-sm); border: none;
    font-family: 'Onest', sans-serif; font-size: 0.85rem; font-weight: 500;
    cursor: pointer; transition: all .2s; white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }
.btn-primary { background: linear-gradient(135deg, var(--sky), var(--sky-dk)); color: #fff; box-shadow: 0 2px 10px var(--sky-glow); }
.btn-primary:hover { box-shadow: 0 4px 18px var(--sky-glow); }
.btn-ghost { background: var(--ghost); color: var(--ink); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-alt); }
.btn-danger { background: var(--err-bg); color: var(--err); }
.btn-select { background: var(--ghost); color: var(--ink); border: 1px solid var(--border); }
.btn-select.active { background: var(--info-bg); border-color: var(--sky); color: var(--info); }
.btn-full { width: 100%; padding: 13px; font-size: 1rem; font-weight: 600; }

/* Forms */
input[type="text"], input[type="password"], input[type="email"], input[type="date"], select, textarea {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: var(--r-sm);
    font-family: 'Onest', sans-serif; font-size: 0.9rem;
    color: var(--ink); background: var(--surface); outline: none;
    transition: border-color .2s, box-shadow .2s, background .3s, color .3s;
    -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus {
    border-color: var(--sky); box-shadow: 0 0 0 3px var(--sky-glow);
}
input::placeholder, textarea::placeholder { color: var(--muted); opacity: .7; }
input.err { border-color: var(--err); }
label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--ink); margin-bottom: 6px; font-family: 'Onest', sans-serif; }
.form-group, .form-field, .field { margin-bottom: 18px; }
.field-error { font-size: 0.73rem; color: var(--err); margin-top: 4px; }

/* Badges */
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
.status-completed  { background: var(--ok-bg);   color: var(--ok); }
.status-failed     { background: var(--err-bg);  color: var(--err); }
.status-processing { background: var(--warn-bg); color: var(--warn); }
.status-pending    { background: var(--info-bg); color: var(--info); }
.badge { padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
.badge-type  { background: var(--sky-glow); color: var(--sky-dk); }
.badge-mount { background: var(--ok-bg); color: var(--ok); }

/* Toast & Notification */
.notification {
    position: fixed; top: calc(var(--header-h) + 12px); right: 20px;
    padding: 11px 20px; border-radius: var(--r-md);
    background: var(--surface); color: var(--ink);
    box-shadow: var(--shadow-lg); border: 1px solid var(--border);
    display: none; z-index: 1100; font-size: 0.88rem; font-weight: 500;
    animation: slideIn .3s ease;
}
.toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 11px 18px; border-radius: var(--r-md);
    font-size: 0.88rem; font-weight: 500; font-family: 'Onest', sans-serif;
    box-shadow: var(--shadow-lg); z-index: 3000;
    opacity: 0; transform: translateY(10px); transition: all .25s; pointer-events: none;
    border: 1px solid transparent;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { background: var(--ok-bg);  color: var(--ok); }
.toast.err { background: var(--err-bg); color: var(--err); }

/* Modal */
.modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    z-index: 2000; align-items: flex-start; justify-content: center;
    overflow-y: auto; padding: 24px 16px;
}
.modal-overlay.visible { display: flex; }
.modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 28px 24px;
    max-width: 420px; width: 100%; box-shadow: var(--shadow-lg);
    animation: popIn .2s ease; margin: auto; color: var(--ink);
}
.modal.modal-lg { max-width: 620px; }
.modal h3 { margin-bottom: 8px; font-size: 1.05rem; font-weight: 600; }
.modal p  { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel {
    background: var(--ghost); color: var(--ink); border: none;
    padding: 9px 18px; border-radius: var(--r-sm);
    cursor: pointer; font-family: 'Onest', sans-serif; font-size: 0.88rem; transition: background .2s;
}
.btn-cancel:hover { background: var(--bg-alt); }
.btn-confirm {
    background: var(--err); color: #fff; border: none;
    padding: 9px 18px; border-radius: var(--r-sm);
    cursor: pointer; font-family: 'Onest', sans-serif; font-size: 0.88rem;
}
.btn-confirm:hover { filter: brightness(.88); }

/* Footer */
.footer {
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 20px; text-align: center; transition: background .3s;
}
.footer-content { max-width: 1200px; margin: 0 auto; color: var(--muted); font-size: 0.85rem; font-family: 'Onest', sans-serif; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ghost); border-radius: 3px; }
::selection { background: var(--sky-glow); color: var(--ink); }

/* Animations */
@keyframes slideIn { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
@keyframes fadeUp  { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes popIn   { from { transform: scale(.88); opacity:0; } to { transform: scale(1); opacity:1; } }
@keyframes spin    { to { transform: rotate(360deg); } }

@media (max-width:768px) {
    .header { padding: 0 1rem; }
    .main-content, .main { padding-top: calc(var(--header-h)+20px); padding-left:14px; padding-right:14px; }
    .card { padding: 20px 16px; }
}
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 80% 50% at 20% 0%, var(--sky-glow), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, var(--sky-glow), transparent);
}
.auth-container { width:100%; max-width:460px; position:relative; z-index:1; }
.auth-logo-row { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:28px; text-decoration:none; }
.auth-logo-row .logo-icon { width:44px; height:44px; font-size:22px; border-radius:12px; }
.auth-logo-row .logo-text { font-size:1.1rem; }
.auth-card {
    background:var(--surface); backdrop-filter:blur(14px);
    border-radius:var(--r-xl); padding:40px 36px;
    box-shadow:var(--shadow-lg); border:1px solid var(--border);
    transition:background .3s, border-color .3s;
}
.auth-theme-row { display:flex; justify-content:flex-end; margin-bottom:8px; }
.auth-card h2 { font-size:1.45rem; font-weight:600; margin-bottom:4px; }
.auth-card .subtitle { font-size:0.88rem; color:var(--muted); margin-bottom:28px; }
.auth-footer {
    text-align:center; margin-top:24px; padding-top:22px;
    border-top:1px solid var(--border); font-size:0.88rem; color:var(--muted); line-height:2;
}
.auth-footer a { color:var(--sky-dk); text-decoration:none; font-weight:600; }
.error-message, .success-message {
    padding:11px 14px; border-radius:var(--r-sm); margin-bottom:18px;
    font-size:0.83rem; display:none; font-weight:500;
}
.error-message   { background:var(--err-bg); color:var(--err); }
.success-message { background:var(--ok-bg);  color:var(--ok); }
@media(max-width:480px){ .auth-card{padding:24px 18px;} }
</style>
<script>
// Theme manager — inline script, runs before page renders
(function(){
    var k='cps_theme';
    var t=localStorage.getItem(k)||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    document.documentElement.setAttribute('data-theme',t);
    window._applyTheme=function(theme){
        document.documentElement.setAttribute('data-theme',theme);
        localStorage.setItem(k,theme);
        document.querySelectorAll('.theme-toggle').forEach(function(b){
            b.textContent=theme==='dark'?'☀️':'🌙';
            b.title=theme==='dark'?'Светлая тема':'Тёмная тема';
        });
    };
    window._toggleTheme=function(){
        var cur=document.documentElement.getAttribute('data-theme')||'light';
        _applyTheme(cur==='dark'?'light':'dark');
    };
    // sync buttons after DOM ready
    document.addEventListener('DOMContentLoaded',function(){
        var isDark=document.documentElement.getAttribute('data-theme')==='dark';
        document.querySelectorAll('.theme-toggle').forEach(function(b){
            b.textContent=isDark?'☀️':'🌙';
            b.title=isDark?'Светлая тема':'Тёмная тема';
        });
    });
})();
</script>
</head>
<body>
<div class="auth-container">
    <a class="auth-logo-row" href="/">
        <div class="logo-icon">📡</div>
        <div class="logo-text"><span>Collaborative</span>PositioningService</div>
    </a>
    <div class="auth-card">
        <div class="auth-theme-row">
            <button class="theme-toggle" onclick="_toggleTheme()" title="Тёмная тема">🌙</button>
        </div>
        <h2>Вход в систему</h2>
        <p class="subtitle">Добро пожаловать обратно</p>
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" placeholder="Введите логин" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>
        <div class="auth-footer">
            Нет аккаунта? <a href="/register">Зарегистрироваться</a><br>
            <a href="/" style="font-size:0.82rem;color:var(--muted);">← На главную</a>
        </div>
    </div>
</div>
<script src="/js/auth.js"></script>
</body>
</html>
