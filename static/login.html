<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Сервис коллаборативного позиционирования</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">📡</div>
                <h1>Вход в систему</h1>
                <p>Сервис коллаборативного позиционирования</p>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login">Логин</label>
                    <input type="text" id="login" name="login" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <div class="auth-footer">
                Нет аккаунта? <a href="/register">Зарегистрироваться</a><br>
                <a href="/" style="color: #6c7a6e; font-size: 0.85rem;">← Вернуться на главную</a>
            </div>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
